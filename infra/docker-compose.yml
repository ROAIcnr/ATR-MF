version: "3.9"

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=dev
      - POSTGRES_DSN=postgresql+asyncpg://aether:aether@postgres:5432/aetherium
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=aetherium
      - POSTGRES_USER=aether
      - POSTGRES_PASSWORD=aether
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
